name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🐳 Build Docker Image
    - name: Build Docker Image
      run: docker build -t suriya396/amazon:${{ github.sha }} .

    # 🔑 Login DockerHub
    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🚀 Push Image
    - name: Push Docker Image
      run: |
        docker push suriya396/amazon:${{ github.sha }}
        docker tag suriya396/amazon:${{ github.sha }} suriya396/amazon:latest
        docker push suriya396/amazon:latest

    # ⚙ Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    # ⚙ Setup Helm
    - name: Setup Helm
      uses: azure/setup-helm@v4

    # 🔑 Configure kubeconfig
    - name: Set kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

    # 🚀 Deploy via Helm
    - name: Deploy to Kubernetes
      run: |
        helm upgrade --install amazon ./amazon \
        --set image.repository=suriya396/amazon \
        --set image.tag=latest \
        --set image.pullPolicy=Always
