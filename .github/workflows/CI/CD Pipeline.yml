name: Secure CI Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🔧 Install Trivy (stable method)
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_$(uname -s)_64bit.tar.gz
        tar -xzf trivy_$(uname -s)_64bit.tar.gz
        sudo mv trivy /usr/local/bin/

    # 🔐 Scan Source Code
    - name: Trivy FS Scan
      run: |
        trivy fs --severity HIGH,CRITICAL --exit-code 1 .

    # 🐳 Build Image
    - name: Build Docker Image
      run: docker build -t suriya396/amazon:${{ github.sha }} .

    # 🔐 Scan Docker Image
    - name: Trivy Image Scan
      run: |
        trivy image --severity HIGH,CRITICAL --exit-code 1 suriya396/amazon:${{ github.sha }}

    # 🔑 Docker Login (requires secrets)
    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🚀 Push Image
    - name: Push Docker Image
      run: |
        docker push suriya396/amazon:${{ github.sha }}
        docker tag suriya396/amazon:${{ github.sha }} suriya396/amazon:latest
        docker push suriya396/amazon:latest
