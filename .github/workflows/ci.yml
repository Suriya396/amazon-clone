name: CI + GitOps Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 🔧 Install Trivy
    - run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.2_Linux-64bit.deb
        sudo dpkg -i trivy_0.50.2_Linux-64bit.deb

    # 🔐 Scan code
    - run: trivy fs --severity HIGH,CRITICAL --exit-code 1 .

    # 🔑 Docker login
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🐳 Build
    - run: docker build -t suriya396/amazon:${{ github.sha }} .

    # 🔐 Scan image
    - run: trivy image --severity CRITICAL --exit-code 1 suriya396/amazon:${{ github.sha }}

    # 🚀 Push
    - run: |
        docker push suriya396/amazon:${{ github.sha }}
        docker tag suriya396/amazon:${{ github.sha }} suriya396/amazon:latest
        docker push suriya396/amazon:latest

    # 🔥 UPDATE HELM FILE (AUTO DEPLOY TRIGGER)
    - name: Update Helm values
      run: |
        sed -i "s/tag: .*/tag: \"${{ github.sha }}\"/" amazon/values.yaml

    # 🔁 COMMIT BACK TO REPO
    - name: Commit updated tag
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add amazon/values.yaml
        git commit -m "update image tag to ${{ github.sha }}" || echo "no changes"
        git push
