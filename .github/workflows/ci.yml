name: CI + GitOps Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 REQUIRED for git push

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🔧 Install Trivy (FIXED - no version issue)
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

    # 🔐 Scan code
    - name: Trivy FS Scan
      run: trivy fs --severity HIGH,CRITICAL --exit-code 1 .

    # 🔑 Docker login
    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🐳 Build image
    - name: Build Docker Image
      run: docker build -t suriya396/amazon:${{ github.sha }} .

    # 🔐 Scan image
    - name: Trivy Image Scan
      run: trivy image --severity CRITICAL --exit-code 1 suriya396/amazon:${{ github.sha }}

    # 🚀 Push image
    - name: Push Docker Image
      run: |
        docker push suriya396/amazon:${{ github.sha }}
        docker tag suriya396/amazon:${{ github.sha }} suriya396/amazon:latest
        docker push suriya396/amazon:latest

    # 🔥 Update Helm values.yaml safely
    - name: Update Helm values
      run: |
        sed -i "s/tag:.*/tag: \"${{ github.sha }}\"/" amazon/values.yaml

    # 🔁 Commit & push back (FIXED)
    - name: Commit updated tag
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git pull origin main --rebase   # 🔥 avoid push conflicts
        git add amazon/values.yaml
        git commit -m "update image tag to ${{ github.sha }}" || echo "no changes"
        git push origin HEAD:main
