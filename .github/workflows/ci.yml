name: CI + GitOps Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    # 🔧 Install Trivy (FIXED)
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

    # 🔐 Scan code (DO NOT FAIL for HIGH)
    - name: Trivy FS Scan
      run: trivy fs --severity HIGH,CRITICAL .

    # 🔑 Docker login
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🐳 Build
    - run: docker build -t suriya396/amazon:${{ github.sha }} .

    # 🔐 Scan image (FAIL only CRITICAL)
    - name: Trivy Image Scan
      run: trivy image --severity CRITICAL --exit-code 1 suriya396/amazon:${{ github.sha }}

    # 🚀 Push
    - run: |
        docker push suriya396/amazon:${{ github.sha }}
        docker tag suriya396/amazon:${{ github.sha }} suriya396/amazon:latest
        docker push suriya396/amazon:latest

    # 🔥 Update Helm
    - name: Update Helm values
      run: |
        sed -i "s/tag:.*/tag: \"${{ github.sha }}\"/" amazon/values.yaml

    # 🔁 Commit back
    - name: Commit updated tag
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git pull origin main --rebase
        git add amazon/values.yaml
        git commit -m "update image tag to ${{ github.sha }}" || echo "no changes"
        git push origin HEAD:main
