name: CI + GitOps Auto Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 required for git push

    steps:
    # 🔹 Checkout code
    - name: Checkout
      uses: actions/checkout@v4

    # 🔹 Install Trivy (no version issues)
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

    # 🔹 Scan filesystem (don’t fail for HIGH)
    - name: Trivy FS Scan
      run: trivy fs --severity HIGH,CRITICAL .

    # 🔹 Docker login
    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 Build Docker image
    - name: Build Docker Image
      run: docker build -t suriya396/amazon:${{ github.sha }} .

    # 🔹 Scan Docker image (fail only CRITICAL)
    - name: Trivy Image Scan
      run: trivy image --severity CRITICAL --exit-code 1 suriya396/amazon:${{ github.sha }}

    # 🔹 Push image
    - name: Push Docker Image
      run: |
        docker push suriya396/amazon:${{ github.sha }}
        docker tag suriya396/amazon:${{ github.sha }} suriya396/amazon:latest
        docker push suriya396/amazon:latest

    # 🔹 Update Helm values.yaml (trigger ArgoCD)
    - name: Update Helm values
      run: |
        sed -i "s/tag:.*/tag: \"${{ github.sha }}\"/" amazon/values.yaml

    # 🔹 Commit + push (clean state fix)
    - name: Commit updated tag
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git fetch origin main
        git checkout main
        git reset --hard origin/main   # 🔥 avoid conflicts

        sed -i "s/tag:.*/tag: \"${{ github.sha }}\"/" amazon/values.yaml

        git add amazon/values.yaml
        git commit -m "update image tag to ${{ github.sha }}" || echo "no changes"

        git push origin main
