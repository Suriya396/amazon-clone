name: CI Pipeline

on:
  push:
    branches:
      - main   # 🔥 auto trigger
  workflow_dispatch:   # manual trigger also

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🔧 Install Trivy (stable)
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.2_Linux-64bit.deb
        sudo dpkg -i trivy_0.50.2_Linux-64bit.deb

    # 🔐 Scan Source Code
    - name: Trivy FS Scan
      run: trivy fs --severity HIGH,CRITICAL --exit-code 1 .

    # 🔑 Login DockerHub
    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🐳 Build Image
    - name: Build Docker Image
      run: docker build -t suriya396/amazon:${{ github.sha }} .

    # 🔐 Scan Docker Image
    - name: Trivy Image Scan
      run: trivy image --severity CRITICAL --exit-code 1 suriya396/amazon:${{ github.sha }}

    # 🚀 Push Image
    - name: Push Docker Image
      run: |
        docker push suriya396/amazon:${{ github.sha }}
        docker tag suriya396/amazon:${{ github.sha }} suriya396/amazon:latest
        docker push suriya396/amazon:latest
