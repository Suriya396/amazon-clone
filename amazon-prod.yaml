apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amazon-prod
  namespace: argocd

spec:
  project: default

  source:
    repoURL: git@github.com:Suriya396/amazon-clone.git
    targetRevision: main
    path: amazon
    helm:
      valueFiles:
        - ../env/prod/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true