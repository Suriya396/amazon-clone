apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amazon-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: git@github.com:Suriya396/amazon-clone.git
    targetRevision: dev
    path: amazon
    helm:
      valueFiles:
        - ../env/dev/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true